<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Sign up</title>
</head>
<style>
     body{
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        background-color: #0a5b15;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    h2 {
        color: rgb(21, 123, 9);
        text-align: center;
       margin-bottom: 20px;
    }
    .card {
    background-color: #37c83e;
    border-radius: 20px;
    padding: 30px;
    width: 300px;
}
form{
    display: flex;
    flex-direction: column;
}
input{
    margin-bottom: 20px;
    padding: 20px;
    border-radius: 10px;
    border: 1px solid rgb(69, 2, 2);
    background-color: #86df9e;
}
button{
    background-color: rgb(49, 181, 51);
    color: #021048;
    padding: 10px;
    border-radius: 10px;
}
button:hover{
    background-color: #0c5e14;
}

</style>
<body>
    <div class="card">
      <form>
        <h2>Sign Up</h2>
        <input type="email" name="" id="" placeholder="Email">
       <input type="name" name="" id=""  placeholder="Name">
       <input type="name" name="" id="" placeholder="Middle Name">
       <input type="name" name="" id="" placeholder="Surname">
       <input type="password" name="" id="" placeholder="Password">
       <button type="submit"><b>Sign up</b></button>
       </form>
    </div>
</body>
</html>
