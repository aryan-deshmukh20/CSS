<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Login Page</title>
</head>
<style>
    body{
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        background-color: #1a1a1a;
        margin: 0;
        padding: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    h2{
       color:rgb(10, 66, 109);
       text-align: center;
       margin-bottom: 20px;
    }
    .card {
    background-color: #c9c4c4;
    border-radius: 10px;
    padding: 30px;
    width: 300px;
}
form{
    display: flex;
    flex-direction: column;
}
input{
    margin-bottom: 20px;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid black;
    background-color: #9d9b9b;
}
button{
    background-color: rgb(12, 99, 102);
    color: #021048;
    padding: 10px;
    border-radius: 10px;
}
button:hover{
    background-color: #5768ab;
}
</style>

<body>
    <div class="card">
        <h2>Login</h2>
        <form>
            <input type="email" name="" id="" placeholder="Email">
            <input type="password" name="" id="" placeholder="Password">
            <button type="submit"><b>Login</b></button>
        </form>
        
    </div>
</body>
</html>
